<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050d18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Meridian — Maritime Route Intelligence</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230c1829'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32'%3E%3Cstop offset='0%25' stop-color='%231d4ed8'/%3E%3Cstop offset='100%25' stop-color='%2322d3ee'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M5 24 C8 17 12 12 16 10 C20 8 24 14 27 21' stroke='%2338bdf8' stroke-width='2.2' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='5' cy='24' r='2.5' fill='%2310b981'/%3E%3Ccircle cx='27' cy='21' r='2.5' fill='%23f43f5e'/%3E%3Cpolygon points='16,10 13.5,16 18.5,16' fill='white' opacity='0.9'/%3E%3C/svg%3E">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ── Tokens — Dark (default) ──────────── */
    :root {
      --bg:    #050d18;
      --srf:   #081422;
      --srf2:  #0c1c2e;
      --srf3:  #102336;
      --bdr:   #16304a;
      --bdr2:  #1e3f5a;
      --blue:  #0ea5e9;
      --blue2: #38bdf8;
      --cyan:  #22d3ee;
      --green: #10b981;
      --red:   #f43f5e;
      --t1:    #f0f9ff;
      --t2:    #94a3b8;
      --t3:    #3d5470;
    }

    /* ── Tokens — Light ───────────────────── */
    :root[data-theme="light"] {
      --bg:    #eef4fb;
      --srf:   #ffffff;
      --srf2:  #f4f8fd;
      --srf3:  #e8f1fa;
      --bdr:   #c8ddf0;
      --bdr2:  #a8c8e8;
      --blue:  #0284c7;
      --blue2: #0369a1;
      --cyan:  #0891b2;
      --green: #059669;
      --red:   #e11d48;
      --t1:    #0a1929;
      --t2:    #334e68;
      --t3:    #64748b;
    }

    /* smooth theme transition */
    body, .sidebar, .route-card, .dist-card, .stat,
    .passages-card, .dd, .banner, .mobile-bar,
    .leaflet-control-zoom a, .leaflet-control-scale-line {
      transition: background .25s, border-color .25s, color .25s, box-shadow .25s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      height: 100dvh;           /* dynamic viewport height — iOS safe */
      background: var(--bg);
      color: var(--t1);
      overflow: hidden;
    }

    /* ════════════════════════════════════════
       SIDEBAR  (desktop: left panel)
    ════════════════════════════════════════ */
    .sidebar {
      width: 368px;
      min-width: 368px;
      background: var(--srf);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 100;
      box-shadow: 4px 0 32px rgba(0,0,0,.4);
      /* mobile sheet transition */
      transition: transform .35s cubic-bezier(.32,1,.6,1);
    }

    .accent-bar {
      height: 3px;
      background: linear-gradient(90deg,#1d4ed8 0%,#0ea5e9 40%,#22d3ee 70%,#10b981 100%);
      flex-shrink: 0;
    }

    /* ── Header ── */
    .hdr {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--bdr);
    }

    .brand { display: flex; align-items: center; gap: 14px; }
    .logo-svg { flex-shrink: 0; display: block; }

    .brand-name {
      font-size: 20px; font-weight: 800;
      letter-spacing: -0.04em; color: var(--t1); line-height: 1;
    }

    .brand-name em {
      font-style: normal;
      background: linear-gradient(90deg, var(--blue2), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      font-size: 10.5px; color: var(--t3); font-weight: 500;
      margin-top: 4px; letter-spacing: .01em;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 14px;
      background: rgba(14,165,233,.08); border: 1px solid rgba(14,165,233,.18);
      border-radius: 999px; padding: 4px 10px;
      font-size: 10px; color: var(--blue2); font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,.7);
    }

    /* ── Body ── */
    .body {
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 14px;
      flex: 1;
    }

    /* ── Route input card ── */
    .route-card {
      background: var(--srf2); border: 1px solid var(--bdr);
      border-radius: 14px; position: relative; overflow: visible;
    }

    .pfield { padding: 14px 46px 12px 16px; position: relative; }
    .pfield + .pfield { border-top: 1px solid var(--bdr); }

    .plabel {
      display: flex; align-items: center; gap: 6px;
      font-size: 9.5px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--t3); margin-bottom: 7px;
      user-select: none;
    }

    .pdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pdot.g { background: var(--green); box-shadow: 0 0 7px rgba(16,185,129,.6); }
    .pdot.r { background: var(--red);   box-shadow: 0 0 7px rgba(244,63,94,.5); }

    .pinput {
      width: 100%; background: none; border: none; outline: none;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      color: var(--t1); padding: 0;
    }

    .pinput::placeholder { color: var(--t3); font-weight: 400; }

    .xclear {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--t3); width: 24px; height: 24px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; opacity: 0;
      transition: opacity .15s, background .15s, color .15s;
    }

    .pfield:focus-within .xclear { opacity: 1; }
    .xclear:hover { background: var(--srf3); color: var(--t2); }

    /* Swap */
    .swap-wrap {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%); z-index: 5;
    }

    .swap {
      width: 30px; height: 30px; background: var(--srf3);
      border: 1px solid var(--bdr2); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--t2); font-size: 13px;
      transition: all .25s;
    }

    .swap:hover {
      background: rgba(14,165,233,.12); border-color: rgba(14,165,233,.35);
      color: var(--blue2); transform: rotate(180deg);
    }

    /* Dropdown */
    .dd {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--srf3); border: 1px solid var(--bdr2);
      border-radius: 10px; z-index: 9999; display: none; overflow: hidden;
      box-shadow: 0 20px 48px rgba(0,0,0,.65);
    }

    .dd.open { display: block; }

    .dd-item {
      padding: 11px 14px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(22,48,74,.6); transition: background .1s;
    }

    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover { background: rgba(14,165,233,.07); }
    .dd-name { font-size: 13.5px; font-weight: 600; color: var(--t1); }
    .dd-ctry { font-size: 11.5px; font-weight: 500; color: var(--t3); }

    /* ── CTA ── */
    .cta {
      border: none; border-radius: 11px; padding: 14px;
      color: #fff; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: .015em;
      cursor: pointer; position: relative; overflow: hidden; transition: all .3s;
      background: linear-gradient(100deg,#1d4ed8 0%,#0ea5e9 55%,#22d3ee 100%);
      background-size: 200%; background-position: 0% 50%;
      box-shadow: 0 4px 20px rgba(14,165,233,.3), inset 0 1px 0 rgba(255,255,255,.15);
    }

    .cta::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,.13) 50%, transparent 65%);
      transform: translateX(-100%); transition: transform .6s;
    }

    .cta:hover:not(:disabled)::after { transform: translateX(100%); }

    .cta:hover:not(:disabled) {
      background-position: 100% 50%; transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(14,165,233,.45), inset 0 1px 0 rgba(255,255,255,.15);
    }

    .cta:disabled {
      background: var(--srf3); color: var(--t3);
      cursor: not-allowed; box-shadow: none; transform: none;
    }

    /* ── Wave loader ── */
    .loader { display: none; align-items: center; justify-content: center; gap: 11px; padding: 4px 0; }
    .loader.show { display: flex; }

    .waves { display: flex; align-items: flex-end; gap: 3px; height: 18px; }

    .waves b {
      display: block; width: 3px; border-radius: 3px;
      background: var(--blue); animation: wv 1s ease-in-out infinite;
    }

    .waves b:nth-child(1) { height: 6px;  animation-delay: .0s; }
    .waves b:nth-child(2) { height: 12px; animation-delay: .1s; }
    .waves b:nth-child(3) { height: 18px; animation-delay: .2s; }
    .waves b:nth-child(4) { height: 12px; animation-delay: .3s; }
    .waves b:nth-child(5) { height: 6px;  animation-delay: .4s; }

    @keyframes wv {
      0%,100% { opacity: .25; transform: scaleY(.5); }
      50%      { opacity: 1;   transform: scaleY(1); }
    }

    .loader-txt { font-size: 12.5px; color: var(--t2); font-weight: 500; }

    /* ── Error ── */
    .err {
      background: rgba(244,63,94,.07); border: 1px solid rgba(244,63,94,.2);
      border-radius: 9px; padding: 11px 14px; color: #fda4af;
      font-size: 12.5px; display: none;
    }

    .err.show { display: block; }

    /* ── Results ── */
    .results { display: none; flex-direction: column; gap: 10px; }
    .results.show { display: flex; }

    .dist-card {
      border-radius: 12px; padding: 18px; position: relative; overflow: hidden;
      background: var(--srf2); border: 1px solid var(--bdr);
    }

    .dist-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--blue), var(--cyan));
      border-radius: 3px 0 0 3px;
    }

    .dist-card::after {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(14,165,233,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .dist-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--t3); margin-bottom: 8px;
    }

    .dist-val {
      font-size: 34px; font-weight: 800; letter-spacing: -0.04em;
      color: var(--t1); line-height: 1;
    }

    .dist-unit { font-size: 15px; font-weight: 600; color: var(--blue2); margin-left: 3px; }

    .dist-alts { margin-top: 7px; font-size: 12px; color: var(--t3); font-weight: 500; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .stat {
      background: var(--srf2); border: 1px solid var(--bdr);
      border-radius: 11px; padding: 14px;
    }

    .stat-ico { font-size: 17px; display: block; margin-bottom: 8px; }
    .stat-lbl { font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--t3); margin-bottom: 2px; }
    .stat-val { font-size: 24px; font-weight: 800; letter-spacing: -0.04em; color: var(--t1); line-height: 1.1; }
    .stat-unit { font-size: 11px; color: var(--t3); font-weight: 500; }

    .passages-card {
      background: var(--srf2); border: 1px solid var(--bdr);
      border-radius: 11px; padding: 13px 14px;
    }

    .pass-lbl { font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--t3); margin-bottom: 9px; }
    .pass-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    .ptag {
      background: rgba(14,165,233,.1); border: 1px solid rgba(14,165,233,.2);
      border-radius: 999px; padding: 3px 11px;
      font-size: 11.5px; color: var(--blue2); font-weight: 600;
    }

    /* ════════════════════════════════════════
       MAP
    ════════════════════════════════════════ */
    #map-wrap { flex: 1; position: relative; min-width: 0; }
    #map { width: 100%; height: 100%; }

    /* Route banner */
    .banner {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: rgba(5,13,24,.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--bdr2); border-radius: 999px;
      padding: 9px 20px; z-index: 500;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,.55);
      pointer-events: none; opacity: 0;
      transition: opacity .4s, transform .4s;
    }

    .banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .banner-sep { color: var(--t3); }

    .banner-pill {
      background: rgba(14,165,233,.14); border: 1px solid rgba(14,165,233,.24);
      border-radius: 999px; padding: 2px 11px;
      font-size: 11.5px; color: var(--blue2); font-weight: 700;
    }

    /* ── Leaflet overrides ── */
    .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 20px rgba(0,0,0,.55) !important; }

    .leaflet-control-zoom a {
      background: rgba(5,13,24,.92) !important; backdrop-filter: blur(8px) !important;
      color: #5b9ac8 !important; border: 1px solid var(--bdr2) !important;
      font-weight: 700 !important; line-height: 30px !important;
      width: 30px !important; height: 30px !important; font-size: 17px !important;
      transition: all .15s !important;
    }

    .leaflet-control-zoom a:hover { background: var(--srf3) !important; color: var(--blue2) !important; }
    .leaflet-control-zoom-in  { border-radius: 8px 8px 0 0 !important; }
    .leaflet-control-zoom-out { border-radius: 0 0 8px 8px !important; }

    .leaflet-control-scale-line {
      background: rgba(5,13,24,.88) !important; backdrop-filter: blur(8px) !important;
      border: 1px solid var(--bdr2) !important; border-top: 2px solid var(--blue) !important;
      color: #5b9ac8 !important; font-size: 10px !important;
      font-family: 'Inter', sans-serif !important; font-weight: 700 !important;
      letter-spacing: .02em !important; padding: 2px 8px !important;
      border-radius: 0 0 6px 6px !important;
    }

    .leaflet-popup-content-wrapper {
      background: rgba(5,13,24,.96) !important; backdrop-filter: blur(12px) !important;
      border: 1px solid var(--bdr2) !important; color: var(--t1) !important;
      border-radius: 10px !important; box-shadow: 0 16px 40px rgba(0,0,0,.65) !important;
    }

    .leaflet-popup-tip { background: rgba(5,13,24,.96) !important; }

    .leaflet-popup-content {
      font-family: 'Inter', sans-serif !important; font-size: 13px !important;
      font-weight: 500 !important; line-height: 1.5 !important;
    }

    /* Animated route */
    .sea-route { stroke-dasharray: 14 9; animation: flow 1.1s linear infinite; }

    @keyframes flow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -23; } }

    @keyframes pulse {
      0%   { transform: scale(.7); opacity: .9; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* ── Theme toggle button ── */
    .theme-btn {
      width: 34px; height: 34px;
      background: var(--srf3);
      border: 1px solid var(--bdr2);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--t2); font-size: 17px;
      flex-shrink: 0;
      transition: all .2s;
    }

    .theme-btn:hover { background: var(--bdr); color: var(--t1); }

    /* Desktop header row: brand + theme btn */
    .hdr-row {
      display: flex; align-items: flex-start; justify-content: space-between;
    }

    /* ── Light-mode Leaflet overrides ── */
    :root[data-theme="light"] .leaflet-control-zoom a {
      background: rgba(255,255,255,.95) !important;
      color: var(--blue2) !important;
      border-color: var(--bdr2) !important;
    }

    :root[data-theme="light"] .leaflet-control-zoom a:hover {
      background: var(--srf3) !important;
    }

    :root[data-theme="light"] .leaflet-control-scale-line {
      background: rgba(255,255,255,.92) !important;
      border-color: var(--bdr2) !important;
      border-top-color: var(--blue) !important;
      color: var(--blue2) !important;
    }

    :root[data-theme="light"] .leaflet-popup-content-wrapper {
      background: rgba(255,255,255,.97) !important;
      border-color: var(--bdr2) !important;
      color: var(--t1) !important;
    }

    :root[data-theme="light"] .leaflet-popup-tip {
      background: rgba(255,255,255,.97) !important;
    }

    :root[data-theme="light"] .banner {
      background: rgba(238,244,251,.9) !important;
      border-color: var(--bdr2) !important;
    }

    :root[data-theme="light"] .mobile-bar {
      background: rgba(238,244,251,.92) !important;
      border-bottom-color: var(--bdr) !important;
    }

    :root[data-theme="light"] .sea-route {
      /* slightly darker route on light map */
      filter: brightness(.75) saturate(1.3);
    }

    /* ════════════════════════════════════════
       MOBILE TOP BAR  (hidden on desktop)
    ════════════════════════════════════════ */
    .mobile-bar {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 300;
      padding: 12px 18px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      background: rgba(5,13,24,.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--bdr);
      align-items: center; justify-content: space-between;
    }

    .mobile-brand { display: flex; align-items: center; gap: 10px; }

    .mobile-brand-name {
      font-size: 17px; font-weight: 800; letter-spacing: -0.03em; color: var(--t1);
    }

    .mobile-brand-name em {
      font-style: normal;
      background: linear-gradient(90deg, var(--blue2), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Sheet toggle button */
    .sheet-toggle {
      width: 36px; height: 36px;
      background: rgba(14,165,233,.1); border: 1px solid rgba(14,165,233,.22);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--blue2); font-size: 16px;
      transition: all .2s;
    }

    .sheet-toggle:hover { background: rgba(14,165,233,.18); }

    /* ════════════════════════════════════════
       RESPONSIVE — MOBILE  (≤ 768px)
    ════════════════════════════════════════ */
    @media (max-width: 768px) {
      body { flex-direction: column; }

      /* Map fills the whole screen */
      #map-wrap {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /* Show mobile top bar */
      .mobile-bar { display: flex; }

      /* Bottom sheet */
      .sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%; min-width: unset;
        max-height: 72dvh;
        border-radius: 20px 20px 0 0;
        border-top: 1px solid var(--bdr2);
        box-shadow: 0 -8px 40px rgba(0,0,0,.55);
        z-index: 200;
        /* sheet slide up/down */
        transform: translateY(0);
      }

      .sidebar.sheet-collapsed {
        transform: translateY(calc(100% - 56px));
      }

      /* Repurpose accent bar as drag handle */
      .accent-bar {
        height: 28px;
        background: var(--srf);
        border-radius: 20px 20px 0 0;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; flex-shrink: 0;
      }

      .accent-bar::before {
        content: '';
        width: 38px; height: 4px;
        background: var(--bdr2); border-radius: 2px;
      }

      /* Hide desktop header in mobile — brand already in top bar */
      .hdr { display: none; }

      .body { padding: 14px 18px 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); }

      /* Bigger touch targets */
      .pfield { padding: 15px 52px 13px 16px; }

      .pinput { font-size: 15px; }

      .dd-item { padding: 13px 16px; }
      .dd-name { font-size: 14.5px; }

      .cta { padding: 16px; font-size: 15px; border-radius: 12px; }

      /* Tighter stats on mobile */
      .dist-val { font-size: 28px; }
      .stat-val  { font-size: 21px; }

      /* Banner above map — offset for top bar height */
      .banner { top: calc(60px + env(safe-area-inset-top, 0px)); }

      /* Move zoom control below mobile top bar */
      .leaflet-top.leaflet-right {
        top: calc(60px + env(safe-area-inset-top, 0px)) !important;
      }

      /* Hide scale bar on mobile (too cramped) */
      .leaflet-bottom.leaflet-right { display: none !important; }
    }

    /* Tablet tweaks */
    @media (min-width: 769px) and (max-width: 1024px) {
      .sidebar { width: 320px; min-width: 320px; }
      .dist-val { font-size: 28px; }
    }
  </style>
</head>
<body>

<!-- Mobile top bar (hidden on desktop) -->
<div class="mobile-bar" id="mobile-bar">
  <div class="mobile-brand">
    <svg width="30" height="30" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="44" height="44" rx="13" fill="url(#mlg)"/>
      <defs>
        <linearGradient id="mlg" x1="0" y1="0" x2="44" y2="44">
          <stop offset="0%"   stop-color="#1e3a8a"/>
          <stop offset="100%" stop-color="#075985"/>
        </linearGradient>
      </defs>
      <path d="M9 31 C12 23 17 16 22 14 C27 12 31 19 35 27" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <circle cx="9" cy="31" r="4" fill="rgba(16,185,129,.25)"/>
      <circle cx="9" cy="31" r="2.5" fill="#10b981"/>
      <circle cx="35" cy="27" r="2.5" fill="#f43f5e"/>
      <path d="M19.5 20.5 L22 14.5 L24.5 20.5 Z" fill="white" opacity="0.9"/>
    </svg>
    <div class="mobile-brand-name"><em>Meridian</em></div>
  </div>
  <button class="theme-btn" id="theme-btn-mobile" onclick="toggleTheme()" title="Toggle light/dark mode" style="margin-right:8px">
    <span id="theme-icon-mobile">🌙</span>
  </button>
  <button class="sheet-toggle" id="sheet-toggle" onclick="toggleSheet()" title="Toggle panel">
    <svg id="toggle-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 5L3 10h10L8 5z"/>
    </svg>
  </button>
</div>

<!-- Sidebar / Bottom sheet -->
<aside class="sidebar" id="sidebar">
  <!-- Drag handle (mobile) / accent stripe (desktop) -->
  <div class="accent-bar" onclick="toggleSheet()"></div>

  <!-- Desktop header -->
  <div class="hdr">
    <div class="hdr-row">
      <div class="brand">
      <svg class="logo-svg" width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="13" fill="url(#lg1)"/>
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="44" y2="44">
            <stop offset="0%"   stop-color="#1e3a8a"/>
            <stop offset="100%" stop-color="#075985"/>
          </linearGradient>
        </defs>
        <path d="M9 31 C12 23 17 16 22 14 C27 12 31 19 35 27" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M9 31 C12 23 17 16 22 14 C27 12 31 19 35 27" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none" stroke-dasharray="2 5" opacity="0.35"/>
        <circle cx="9"  cy="31" r="4.5" fill="rgba(16,185,129,.25)"/>
        <circle cx="9"  cy="31" r="2.8" fill="#10b981"/>
        <circle cx="35" cy="27" r="2.8" fill="#f43f5e"/>
        <path d="M19.5 20.5 L22 14.5 L24.5 20.5 Z" fill="white" opacity="0.9"/>
        <line x1="18" y1="21" x2="26" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <div>
        <div class="brand-name"><em>Meridian</em></div>
        <div class="brand-sub">Maritime Route Intelligence</div>
      </div>
    </div><!-- /brand -->
      <button class="theme-btn" id="theme-btn-desktop" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span id="theme-icon-desktop">🌙</span>
      </button>
    </div><!-- /hdr-row -->
    <div class="badge">
      <div class="badge-dot"></div>
      Powered by searoute-py
    </div>
  </div>

  <div class="body">
    <!-- Port inputs -->
    <div class="route-card">
      <div class="pfield" id="pf-origin">
        <div class="plabel"><span class="pdot g"></span>Origin Port</div>
        <input class="pinput" id="origin-input" type="text"
               placeholder="Search port or country…" autocomplete="off" />
        <button class="xclear" onclick="clearPort('origin')" title="Clear">✕</button>
        <div class="dd" id="origin-dd"></div>
      </div>

      <div class="swap-wrap">
        <button class="swap" onclick="swapPorts()" title="Swap ports">⇅</button>
      </div>

      <div class="pfield" id="pf-dest">
        <div class="plabel"><span class="pdot r"></span>Destination Port</div>
        <input class="pinput" id="dest-input" type="text"
               placeholder="Search port or country…" autocomplete="off" />
        <button class="xclear" onclick="clearPort('dest')" title="Clear">✕</button>
        <div class="dd" id="dest-dd"></div>
      </div>
    </div>

    <!-- CTA -->
    <button class="cta" id="cta" disabled onclick="computeRoute()">
      Calculate Shortest Sea Route
    </button>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="waves"><b></b><b></b><b></b><b></b><b></b></div>
      <span class="loader-txt">Computing maritime route…</span>
    </div>

    <!-- Error -->
    <div class="err" id="err"></div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="dist-card">
        <div class="dist-lbl">Shortest Sea Distance</div>
        <div class="dist-val">
          <span id="res-naut">—</span><span class="dist-unit">nmi</span>
        </div>
        <div class="dist-alts" id="res-alts">—</div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-ico">⏱️</span>
          <div class="stat-lbl">Est. Duration</div>
          <div class="stat-val" id="res-days">—</div>
          <div class="stat-unit">days @ 24 kn</div>
        </div>
        <div class="stat">
          <span class="stat-ico">🕐</span>
          <div class="stat-lbl">Total Hours</div>
          <div class="stat-val" id="res-hours">—</div>
          <div class="stat-unit">hours</div>
        </div>
      </div>

      <div class="passages-card" id="passages-card" style="display:none">
        <div class="pass-lbl">Key Passages Traversed</div>
        <div class="pass-tags" id="pass-tags"></div>
      </div>
    </div>
  </div>
</aside>

<!-- Map -->
<div id="map-wrap">
  <div id="map"></div>
  <div class="banner" id="banner">
    <span id="b-from">—</span>
    <span class="banner-sep">→</span>
    <span id="b-to">—</span>
    <span class="banner-pill" id="b-dist">—</span>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────
  let originPort = null, destPort = null;
  let routeLayer = null, oMarker = null, dMarker = null;
  let sheetOpen  = true;
  let tileLayer  = null;
  let isDark     = true;

  // ── Mobile sheet toggle ───────────────────────────────────────
  function toggleSheet() {
    const isMobile = window.innerWidth <= 768;
    if (!isMobile) return;
    sheetOpen = !sheetOpen;
    document.getElementById('sidebar').classList.toggle('sheet-collapsed', !sheetOpen);
    // Flip chevron
    const icon = document.getElementById('toggle-icon');
    icon.style.transform = sheetOpen ? '' : 'rotate(180deg)';
    icon.style.transition = 'transform .3s';
  }

  // Auto-expand sheet when results arrive (mobile)
  function expandSheet() {
    if (window.innerWidth <= 768 && !sheetOpen) {
      sheetOpen = true;
      document.getElementById('sidebar').classList.remove('sheet-collapsed');
      const icon = document.getElementById('toggle-icon');
      icon.style.transform = '';
    }
  }

  // ── Map ───────────────────────────────────────────────────────
  const map = L.map('map', {
    center: [25, 15], zoom: 2,
    minZoom: 2, maxZoom: 14,
    zoomControl: false,
    worldCopyJump: true,
    maxBounds: [[-85, -220], [85, 220]],
    maxBoundsViscosity: 0.65,
  });

  L.control.zoom({ position: 'topright' }).addTo(map);
  L.control.scale({ position: 'bottomright', imperial: false, maxWidth: 140 }).addTo(map);

  // tile layer managed by theme system
  function setTile(dark) {
    if (tileLayer) map.removeLayer(tileLayer);
    const url = dark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
    tileLayer = L.tileLayer(url, { attribution: '© OpenStreetMap © CARTO', maxZoom: 14 }).addTo(map);
  }

  // ── Theme toggle ──────────────────────────────────────────────
  function toggleTheme() {
    isDark = !isDark;
    applyTheme(isDark);
    localStorage.setItem('meridian-theme', isDark ? 'dark' : 'light');
  }

  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    const icon = dark ? '🌙' : '☀️';
    document.getElementById('theme-icon-desktop').textContent = icon;
    document.getElementById('theme-icon-mobile').textContent  = icon;
    document.querySelector('meta[name="theme-color"]')
      .setAttribute('content', dark ? '#050d18' : '#eef4fb');
    setTile(dark);
  }

  function initTheme() {
    const saved = localStorage.getItem('meridian-theme');
    isDark = saved ? saved === 'dark' : true;
    applyTheme(isDark);
  }

  initTheme();

  // ── Autocomplete ──────────────────────────────────────────────
  function initAC(inputId, ddId, isOrigin) {
    const input = document.getElementById(inputId);
    const dd    = document.getElementById(ddId);
    let tmr;

    input.addEventListener('input', () => {
      clearTimeout(tmr);
      const q = input.value.trim();
      if (q.length < 2) { closeDd(dd); return; }
      tmr = setTimeout(() => loadSuggestions(q, dd, input, isOrigin), 180);
    });

    input.addEventListener('blur', () => setTimeout(() => closeDd(dd), 200));
  }

  async function loadSuggestions(q, dd, input, isOrigin) {
    try {
      const res   = await fetch(`/api/ports?q=${encodeURIComponent(q)}`);
      const ports = await res.json();
      if (!ports.length) { closeDd(dd); return; }

      dd.innerHTML = ports.map(p => `
        <div class="dd-item" data-port='${JSON.stringify(p)}'>
          <span class="dd-name">${p.name}</span>
          <span class="dd-ctry">${p.country}</span>
        </div>
      `).join('');

      dd.querySelectorAll('.dd-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          const port = JSON.parse(e.currentTarget.dataset.port);
          input.value = `${port.name}, ${port.country}`;
          if (isOrigin) originPort = port; else destPort = port;
          closeDd(dd);
          syncCTA();
        });
      });

      dd.classList.add('open');
    } catch (_) { closeDd(dd); }
  }

  function closeDd(dd) { dd.classList.remove('open'); }

  function clearPort(which) {
    if (which === 'origin') { originPort = null; document.getElementById('origin-input').value = ''; }
    else { destPort = null; document.getElementById('dest-input').value = ''; }
    syncCTA();
  }

  function swapPorts() {
    const oi = document.getElementById('origin-input');
    const di = document.getElementById('dest-input');
    [oi.value, di.value] = [di.value, oi.value];
    [originPort, destPort] = [destPort, originPort];
    syncCTA();
  }

  function syncCTA() {
    document.getElementById('cta').disabled = !(originPort && destPort);
  }

  // ── Compute ───────────────────────────────────────────────────
  async function computeRoute() {
    if (!originPort || !destPort) return;

    $hide('results'); $hide('err');
    $show('loader');
    document.getElementById('cta').disabled = true;

    try {
      const res  = await fetch('/api/route', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ origin: originPort, destination: destPort }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const { distance_naut, distance_km, distance_miles, duration_hours, passages, coordinates } = data;
      const hours = duration_hours ?? (distance_naut / 24);

      countUp('res-naut',  distance_naut,    1);
      countUp('res-days',  hours / 24,       1);
      countUp('res-hours', Math.round(hours), 0);

      document.getElementById('res-alts').textContent =
        `${distance_km.toLocaleString()} km  ·  ${distance_miles.toLocaleString()} mi`;

      const pc = document.getElementById('passages-card');
      if (passages?.length) {
        document.getElementById('pass-tags').innerHTML =
          passages.map(p => `<span class="ptag">${p}</span>`).join('');
        pc.style.display = '';
      } else {
        pc.style.display = 'none';
      }

      // Map
      if (routeLayer) map.removeLayer(routeLayer);
      if (oMarker)    map.removeLayer(oMarker);
      if (dMarker)    map.removeLayer(dMarker);

      routeLayer = L.polyline(coordinates, {
        color: '#38bdf8', weight: 2.5, opacity: .92,
        className: 'sea-route',
      }).addTo(map);

      oMarker = L.marker([originPort.lat, originPort.lon], { icon: pinIcon('#10b981', true) })
        .bindPopup(`<b>${originPort.name}</b><br>${originPort.country}`).addTo(map);

      dMarker = L.marker([destPort.lat, destPort.lon], { icon: pinIcon('#f43f5e', false) })
        .bindPopup(`<b>${destPort.name}</b><br>${destPort.country}`).addTo(map);

      map.fitBounds(routeLayer.getBounds(), { padding: [60, 60], maxZoom: 8 });

      // Banner
      document.getElementById('b-from').textContent = originPort.name;
      document.getElementById('b-to').textContent   = destPort.name;
      document.getElementById('b-dist').textContent = `${distance_naut.toLocaleString()} nmi`;
      document.getElementById('banner').classList.add('show');

      $show('results');
      expandSheet();   // auto-expand bottom sheet on mobile

    } catch (err) {
      document.getElementById('err').textContent = `⚠ ${err.message}`;
      $show('err');
    } finally {
      $hide('loader');
      document.getElementById('cta').disabled = false;
    }
  }

  // ── Helpers ───────────────────────────────────────────────────
  function pinIcon(color, withPulse) {
    const pulse = withPulse
      ? `<div style="position:absolute;inset:-6px;border-radius:50%;border:2px solid ${color};animation:pulse 1.8s ease-out infinite;"></div>`
      : '';
    return L.divIcon({
      className: '',
      html: `<div style="position:relative;width:14px;height:14px;">
               ${pulse}
               <div style="width:14px;height:14px;background:${color};border-radius:50%;border:2.5px solid rgba(255,255,255,.88);box-shadow:0 3px 12px rgba(0,0,0,.55);"></div>
             </div>`,
      iconAnchor: [7, 7],
    });
  }

  function countUp(id, target, decimals) {
    const el = document.getElementById(id);
    const dur = 900, t0 = performance.now();
    (function step(now) {
      const p = Math.min((now - t0) / dur, 1);
      const e = 1 - Math.pow(1 - p, 3);
      el.textContent = (target * e).toLocaleString(undefined, {
        minimumFractionDigits: decimals, maximumFractionDigits: decimals,
      });
      if (p < 1) requestAnimationFrame(step);
    })(t0);
  }

  function $show(id) { document.getElementById(id).classList.add('show'); }
  function $hide(id) { document.getElementById(id).classList.remove('show'); }

  initAC('origin-input', 'origin-dd', true);
  initAC('dest-input',   'dest-dd',   false);
</script>
</body>
</html>
